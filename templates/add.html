{% extends "base.html" %}

{% block content %}
<div class="card shadow p-5 mt-4">
    <h2 class="text-primary text-center mb-4">🎤 Step up to the Mic!</h2>
    
    <form action="/add" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">The Setup:</label>
            <input type="text" name="setup" class="form-control" required placeholder="Why did the developer go broke?">
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold">The Punchline:</label>
            <input type="text" name="punchline" class="form-control" required placeholder="Because he used up all his cache.">
        </div>
        
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg">Submit Joke!</button>
        </div>
    </form>
    
    <div class="text-center mt-4">
        <a href="/" class="text-decoration-none text-secondary">Back to Home</a>
    </div>
</div>
{% endblock %}
